version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: fashion_mysql
    restart: always
    environment:
      MYSQL_DATABASE: fashion_shop
      MYSQL_USER: fashion_user
      MYSQL_PASSWORD: fashion_pass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - fashion_network

  redis:
    image: redis:7-alpine
    container_name: fashion_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - fashion_network

  backend:
    build: .
    container_name: fashion_backend
    restart: always
    depends_on:
      - mysql
      - redis
    environment:
      DB_HOST: mysql
      DB_NAME: fashion_shop
      DB_USER: fashion_user
      DB_PASSWORD: fashion_pass
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - media_volume:/app/media
    networks:
      - fashion_network

  celery:
    build: .
    container_name: fashion_celery
    restart: always
    depends_on:
      - mysql
      - redis
      - backend
    environment:
      DB_HOST: mysql
      DB_NAME: fashion_shop
      DB_USER: fashion_user
      DB_PASSWORD: fashion_pass
      REDIS_HOST: redis
    command: celery -A fashion_shop worker --loglevel=info
    volumes:
      - .:/app
      - media_volume:/app/media
    networks:
      - fashion_network

volumes:
  mysql_data:
  media_volume:

networks:
  fashion_network:
    driver: bridge